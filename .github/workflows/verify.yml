name: Verify public snapshot

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: showcase-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install syntax checkers
        run: >-
          sudo apt-get update &&
          sudo apt-get install --no-install-recommends --yes
          lua5.4 python3 ruby shellcheck zsh
      - name: Verify exact public tree and examples
        run: scripts/verify-showcase.sh --ci
